<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{border: 1px solid rgb(0, 60, 255);margin: 0px;padding: 0px}
        .box{
            width: 100px; 
            height: 100px;
            border-color: black;
            display: inline-block;
        }

        #box1{background-color: rgb(135, 255, 105);
            
        }
        #box2{background-color: rgb(0, 217, 255);
            
            
        }
        #box3{background-color: rgb(200, 255, 0);
            

        }
        #box4{background-color: rgb(204, 0, 255);
            
        }
        #box5{background-color: rgb(128, 0, 0);
        
        }
        span:last-child{background-color: aquamarine;
        
        }
        #container{position: relative;
        border-color: rgb(35, 3, 148);
        border-width: 2px;
    }
            
    </style>
</head>
<body>

    <div style="height: 100px;">

    </div>
    <div id="container">

        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class="box">6</span>

    </div>
    
</body>
</html>
