<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <label id="num1"> Numero 1 </label>
    <input type="number" id="inicio">
     <label id="num2"> Numero 2 </label>
    <input type="number" id="final">

    <button id="verificar">Verificar</button>
    <div id="resultado"></div>

    <script>
    let inicio = document.querySelector("#inicio")
    let fim = document.querySelector("#final")
    let verificar = document.querySelector("#verificar")
    let resultado = document.querySelector("#resultado")
    verificar.addEventListener ("click",()=>{
        resultado.innerHTML=""
        Number.parseInt (inicio.value)
        Number.parseInt (fim.value)

        let primos=primosIntervalo( Number.parseInt (inicio.value), Number.parseInt (fim.value) )
        for (i = 0; i < primos.length ; i++){
            resultado.innerHTML+=primos[i]+";";
        }

    })
    
    function primo(n){

        if(n === 2){
            return true
        }

        for (i=2 ; i<n; i++){
            if(n % i === 0){
                return false
            }
            else {
                return true
            }
        }
    }
    function primosIntervalo (a,b){
          result = []
          for ( let i=a; i<= b ; i++ ){
            if (primo(i)){
                result.push(i)
            }
          }
          return(result)
    }
  
    
    
    </script>

</body>
</html>
