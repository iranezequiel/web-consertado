<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Cálculo de IMC</h1>

    <label for="nome">Nome:</label>
    <input type="text" id="nome"><br><br>

    <label for="peso">Peso (kg):</label>
    <input type="number" id="peso" step="0.1"><br><br>

    <label for="altura">Altura (m):</label>
    <input type="number" id="altura" step="0.01"><br><br>

    <button id="btn">Calcular</button>

    <p id="resultadoIMC"></p>
    <p id="classificacao"></p>
    <img id="imgPerfil" src="" style="width:150px; display:none;">

    <script>
        let btn = document.getElementById("btn")

        btn.addEventListener("click", ()=>{
            let nome   = document.getElementById("nome").value
            let peso   = parseFloat(document.getElementById("peso").value)
            let altura = parseFloat(document.getElementById("altura").value)

            if (nome === "" || isNaN(peso) || isNaN(altura)) {
                alert("Preencha todos os campos!")
                return
            }

            let imc = peso / (altura * altura)
            let classificacao = ""

            if (imc < 18.5) {
                classificacao = "Abaixo do peso"
            } else if (imc < 24.9) {
                classificacao = "Peso normal"
            } else if (imc < 29.9) {
                classificacao = "Sobrepeso"
            } else if (imc < 34.9) {
                classificacao = "Obesidade grau 1"
            } else if (imc < 39.9) {
                classificacao = "Obesidade grau 2"
            } else {
                classificacao = "Obesidade grau 3 (mórbida)"
            }

            document.getElementById("resultadoIMC").innerText  = nome + ", seu IMC é: " + imc.toFixed(2)
            document.getElementById("classificacao").innerText = "Classificação: " + classificacao

            let faixa = Math.floor(imc)
            let img = document.getElementById("imgPerfil")
            img.style.display = "block"

            switch (true) {
                case faixa < 18: img.src = "../imgs/abaixopeso.png";  break
                case faixa < 25: img.src = "../imgs/normal.png";      break
                case faixa < 30: img.src = "../imgs/sobrepeso.png";   break
                case faixa < 35: img.src = "../imgs/obesidade1.png";  break
                case faixa < 40: img.src = "../imgs/obesidade2.png";  break
                default:         img.src = "../imgs/obesidade3.png"
            }
        })
    </script>
</body>
</html>
