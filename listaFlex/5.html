<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Layout Flex</title>

<style>

body{
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 30px; /* AUMENTA TUDO */
}

/* header */
.header{
    background: #8cc800;
    height: 100px;
    padding: 10px;
}

/* meio */
.meio{
    flex: 1;
    display: flex;
}

/* article */
.article{
    flex: 3;
    background: #eee;
    padding: 10px;
}

/* aside */
.aside{
    flex: 1;
    background: #d8d3b5;
    padding: 10px;
}

/* nav */
.nav{
    flex: 1;
    background: #b7cbb5;
    padding: 10px;
}

/* footer */
.footer{
    background: #8cc800;
    height: 100px;
    padding: 10px;
}

</style>

</head>
<body>

<div class="header">Header</div>

<div class="meio">
    <div class="article">Article</div>
    <div class="aside">Aside</div>
    <div class="nav">Nav</div>
</div>

<div class="footer">Footer</div>

</body>
</html>
