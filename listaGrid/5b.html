<!DOCTYPE html>
<head>
    <style>

        body{
            margin: 0;
        }

        .container{
            display: grid;
            height: 100vh;
            width: 100vw;

            grid-template-columns: 2fr 1.3fr 2fr 0.8fr;
            grid-template-rows: 1fr 1fr 1fr;

            grid-template-areas:
                "box1 box4 box5 box5"
                "box2 box4 box6 box7"
                "box3 box3 box6 box7";

            gap: 3px;
            background-color: white;
        }

        @media (max-width:600px){
            .container{
                grid-template-columns: 1fr;
                grid-template-rows: repeat(7, 100px);

                grid-template-areas:
                    "box1"
                    "box2"
                    "box3"
                    "box4"
                    "box5"
                    "box6"
                    "box7";
            }
        }

        .box{
            border: 1px solid white;
        }

        #box1{
            grid-area: box1;
            background-color: orange;
        }

        #box2{
            grid-area: box2;
            background-color: lightsteelblue;
        }

        #box3{
            grid-area: box3;
            background-color: goldenrod;
        }

        #box4{
            grid-area: box4;
            background-color: #e7b19f;
        }

        #box5{
            grid-area: box5;
            background-color: #d2dfdf;
        }

        #box6{
            grid-area: box6;
            background-color: #b8c96d;
        }

        #box7{
            grid-area: box7;
            background-color: white;

            display: grid;
            grid-template-rows: repeat(4, 1fr);
            justify-items: center;
            align-items: center;
        }

        #c1, #c2, #c3, #c4{
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }


        #c1{background-color: coral;}
        #c2{background-color: rosybrown;}
        #c3{background-color: #b8c96d;}
        #c4{background-color: lavender;}

    </style>
</head>
<body>

    <div class="container">
        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>
        <div class="box" id="box5"></div>
        <div class="box" id="box6"></div>

        <div class="box" id="box7">
            <div id="c1"></div>
            <div id="c2"></div>
            <div id="c3"></div>
            <div id="c4"></div>
        </div>
    </div>

</body>
</html>
