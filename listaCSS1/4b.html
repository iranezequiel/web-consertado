<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0;padding: 0;}

        body{min-height: 100vh;}
        .box{
        box-sizing: border-box;
        border:1px solid black ;
        text-align: center;
        line-height: 25vh;
        height: 25vh;
        width: 25vw;
        display: inline-block;
        }
        #box1{background-color: cornsilk;}
        #box2{background-color: antiquewhite;}
        #box3{background-color: blanchedalmond;}
        #box4{background-color: burlywood;}
    </style>
</head>
<body>
<div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div>
<!-- div#box$.box*4{$} -->
</body>
</html>
