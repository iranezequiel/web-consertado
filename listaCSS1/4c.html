<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0;padding: 0;}

        body{min-height: 100vh;}
        .box{
        box-sizing: border-box;
        border:1px solid black ;
        height: 100px;
        width: 100px;
        display: inline-block;
        }
        #box1{background-color: cornsilk;
        position: fixed;
        left: 0px;top: 0px;}
        #box2{background-color: antiquewhite;
        position: fixed;
        right: 0px;}
        #box3{background-color: blanchedalmond;
        position: fixed;
        right: 0px;bottom: 0px;}
        #box4{background-color: burlywood;
        position: fixed;
        left: 0px;bottom: 0px;animation: rotacao 5s linear 0s infinite;}
        #box5{background-color: wheat;
        position: fixed;top: 50%;left: 50%;
        transform:translate(-50%,-50%);
        /*animation: name duration timing-function delay iteration-count direction fill-mode;*/
        
        }

        @keyframes rotacao {
            0%{}

            100%{transform: rotate(360deg);}
        }



    </style>
</head>
<body>
<div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div><div id="box5" class="box">5</div>
<!-- div#box$.box*4{$} -->
</body>
</html>
