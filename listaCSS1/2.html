<!DOCTYPE html>
<head>   
   <title>Exemplo especificidade de seletores</title>
   <style>
      /*regra 1*/ li{color:red;} 
      /* aqui é o mais básico, pega todos os <li> */

      /*regra 2*/ .churras{color:green;} 
      /* classe já é mais forte que só o elemento */

      /*regra 3*/ .fruta{color:gray}
      /* mesma coisa, outra classe */

      /*regra 4*/ li+li.churras{color: black;}
      /* pega um <li> com classe churras que vem logo depois de outro li */

      /*regra 5*/ .churras[draggable="true"]{color: magenta;}
      /* pega churras que tem draggable=true (mais específico ainda) */

      /*regra 6*/ #lip1,#lip2,#lip3{color:blue}
      /* ID é bem mais forte que classe e elemento */

      /*regra 7*/ #lip3.fruta{color:orange}
      /* ID + classe = mais forte ainda */

      /*regra 8*/ ol>li.churras#lip5{color:purple}
      /* super específico, mas nem vai funcionar pq não tem lip5 */
   </style>
</head>
<body>   
   <ol>

   <!--item 1-->
   <li id="lip0">Abacaxi</li>
   <!-- só entra na regra 1
        então fica vermelho -->

   <!--item 2-->
   <li class="fruta">Melão</li>
   <!-- regra 1 e 3
        classe ganha do elemento
        fica cinza -->

   <!--item 3-->
   <li id="lip2" class="fruta">Pera</li>
   <!-- regra 1, 3 e 6
        ID ganha de tudo isso
        fica azul -->

   <!--item 4-->
   <li id="lip3" class="fruta">Uva</li>
   <!-- regra 1, 3, 6 e 7
        regra 7 é mais forte (ID + classe)
        fica laranja -->

   <!--item 5-->
   <li id="lip4" class="fruta">Maçã</li>
   <!-- regra 1 e 3
        não tem regra pro ID dele
        então fica cinza -->

   <!--item 6-->
   <li class="churras">Carne</li>
   <!-- regra 1 e 2
        classe ganha
        fica verde -->

   <!--item 7-->
   <li class="churras">Linguiça</li>
   <!-- regra 1, 2 e 4
        regra 4 é mais específica
        então fica preto -->

   <!--item 8-->
   <li id="lip7" class="churras" draggable="true">Pão de alho</li>
   <!-- regra 1, 2, 4 e 5
        regra 5 ganha pq tem classe + atributo
        então fica magenta -->

   </ol>   
</body>
</html>
